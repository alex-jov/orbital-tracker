<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Satellite body -->
  <rect x="24" y="24" width="16" height="16" rx="2" fill="#60a5fa" stroke="#93c5fd" stroke-width="1"/>
  <!-- Solar panels -->
  <rect x="2" y="27" width="18" height="10" rx="1" fill="#3b82f6" stroke="#93c5fd" stroke-width="1"/>
  <rect x="44" y="27" width="18" height="10" rx="1" fill="#3b82f6" stroke="#93c5fd" stroke-width="1"/>
  <!-- Panel lines -->
  <line x1="8" y1="27" x2="8" y2="37" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="14" y1="27" x2="14" y2="37" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="50" y1="27" x2="50" y2="37" stroke="#93c5fd" stroke-width="0.5"/>
  <line x1="56" y1="27" x2="56" y2="37" stroke="#93c5fd" stroke-width="0.5"/>
  <!-- Antenna -->
  <line x1="32" y1="24" x2="32" y2="14" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="32" cy="12" r="2.5" fill="none" stroke="#93c5fd" stroke-width="1"/>
  <!-- Signal waves -->
  <path d="M26 10 Q22 6 26 2" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <path d="M38 10 Q42 6 38 2" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
</svg>
