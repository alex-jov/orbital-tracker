<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbital Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="globe-canvas"></canvas>

  <!-- Top bar -->
  <header id="topbar">
    <div class="topbar-left">
      <div class="logo-group">
        <div class="logo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(30 12 12)"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-30 12 12)"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
          <span>ORBITAL TRACKER</span>
        </div>
        <div class="topbar-badge" id="sat-total-badge">--</div>
      </div>
    </div>
    <div class="topbar-center">
      <div class="filter-bar">
        <button class="filter-chip active" data-cat="all">All</button>
        <button class="filter-chip" data-cat="stations">Stations</button>
        <button class="filter-chip" data-cat="starlink">Starlink</button>
        <button class="filter-chip" data-cat="visual">Brightest</button>
        <button class="filter-chip" data-cat="weather">Weather</button>
        <button class="filter-chip" data-cat="science">Science</button>
        <button class="filter-chip" data-cat="gps-ops">GPS</button>
        <button class="filter-chip" data-cat="active">Other</button>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-clock" id="utc-clock">--:--:-- UTC</div>
    </div>
  </header>

  <!-- Telemetry panel (right) -->
  <aside id="telemetry">
    <div class="telem-header">
      <h2 id="sat-name">No selection</h2>
      <span class="telem-norad" id="sat-norad"></span>
    </div>
    <div class="telem-grid">
      <div class="telem-card">
        <div class="telem-label">LAT</div>
        <div class="telem-value mono" id="sat-lat">--</div>
      </div>
      <div class="telem-card">
        <div class="telem-label">LON</div>
        <div class="telem-value mono" id="sat-lon">--</div>
      </div>
      <div class="telem-card">
        <div class="telem-label">ALT</div>
        <div class="telem-value mono" id="sat-alt">--</div>
      </div>
      <div class="telem-card">
        <div class="telem-label">SPEED</div>
        <div class="telem-value mono" id="sat-speed">--</div>
      </div>
    </div>
    <div class="telem-section">
      <div class="telem-row">
        <span class="telem-row-label">Visibility</span>
        <span class="telem-row-value" id="sat-visibility">--</span>
      </div>
      <div class="telem-row">
        <span class="telem-row-label">Elevation</span>
        <span class="telem-row-value" id="sat-elevation">--</span>
      </div>
      <div class="telem-row">
        <span class="telem-row-label">Category</span>
        <span class="telem-row-value" id="sat-category">--</span>
      </div>
    </div>
    <div class="telem-footer">
      <a id="sat-info-link" class="telem-link" href="#" target="_blank" rel="noopener noreferrer">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        More info on N2YO
      </a>
    </div>
  </aside>

  <!-- Bottom controls -->
  <div id="bottombar">
    <button class="bottom-btn" id="btn-orbits">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="4"/></svg>
      Orbit
    </button>
    <button class="bottom-btn" id="btn-locate">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      Locate me
    </button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="loading-content">
      <div class="loading-ring">
        <svg width="48" height="48" viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(79,172,254,0.15)" stroke-width="3"/>
          <circle cx="24" cy="24" r="20" fill="none" stroke="#4facfe" stroke-width="3" stroke-dasharray="40 86" stroke-linecap="round" class="loading-arc"/>
        </svg>
      </div>
      <p class="loading-title">ORBITAL TRACKER</p>
      <p class="loading-sub" id="loading-text">Initializing...</p>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/dist/satellite.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
